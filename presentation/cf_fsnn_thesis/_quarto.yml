project:
  output-dir: _output

format:
  revealjs:
    theme: ../_shared/theme/cf_dark.scss
    slide-number: c/t
    navigation-mode: linear
    html-math-method: katex
    fig-align: center
    embed-resources: false
    include-after-body: fit-equations.js   # auto-scale wide equations to fit their .eq box

profile:
  default: reduced
  group:
    - [reduced, full]
